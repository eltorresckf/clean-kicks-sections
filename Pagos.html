<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    padding:12px;
}

.container{
    width:100%;
    max-width:720px;
    margin:0 auto;
}

.payment-bar{

    width:100%;

    background:#111111;

    border-radius:14px;

    padding:16px 20px;

    margin-bottom:12px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:10px;

    color:#ffffff;

    transition:all .25s ease;

}

.payment-bar:last-child{

    margin-bottom:0;

}

.payment-bar:hover{

    background:#1a1a1a;

}

.payment-text{

    font-size:16px;

    font-weight:500;

    line-height:1;

    white-space:nowrap;

}

.payment-logo{

    display:flex;

    align-items:center;

}

.payment-logo img{

    display:block;

    height:24px;

    width:auto;

    max-width:none;

}

@media (max-width:768px){

    body{

        padding:10px;

    }

    .payment-bar{

        padding:14px 16px;

        gap:8px;

        border-radius:12px;

    }

    .payment-text{

        font-size:15px;

    }

    .payment-logo img{

        height:20px;

    }

}

</style>
</head>

<body>

<div class="container">

    <div class="payment-bar">

        <div class="payment-text">
            Pago seguro con MercadoPago
        </div>

        <div class="payment-logo">
            <img src="assets/Mercado_Pago.svg.webp" alt="Mercado Pago">
        </div>

    </div>

    <div class="payment-bar">

        <div class="payment-text">
            Pago seguro con PayPal
        </div>

        <div class="payment-logo">
            <img src="assets/paypal.svg" alt="PayPal">
        </div>

    </div>

</div>

<script>

function sendHeight() {
    const height = document.documentElement.scrollHeight;
    parent.postMessage({ frameHeight: height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

new ResizeObserver(sendHeight).observe(document.body);

</script>

</body>
</html>
