<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    padding:12px;
}

.container{
    width:100%;
    max-width:720px;
    margin:0 auto;
}

.payment-bar{

    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#2b2b2b;

    color:#fff;

    border-radius:14px;

    padding:16px 20px;

    margin-bottom:12px;

    transition:all .25s ease;

}

.payment-bar:last-child{

    margin-bottom:0;

}

.payment-bar:hover{

    background:#353535;

}

.payment-text{

    font-size:16px;
    font-weight:500;
    letter-spacing:.2px;
    white-space:nowrap;

}

.payment-logo{

    display:flex;
    justify-content:flex-end;
    align-items:center;
    flex-shrink:0;

}

.payment-logo img{

    display:block;
    height:24px;
    width:auto;
    max-width:140px;

}

@media (max-width:768px){

    body{

        padding:10px;

    }

    .payment-bar{

        padding:14px 16px;

    }

    .payment-text{

        font-size:15px;

    }

    .payment-logo img{

        height:20px;
        max-width:110px;

    }

}

</style>
</head>

<body>

<div class="container">

    <div class="payment-bar">

        <div class="payment-text">
            Pago seguro con
        </div>

        <div class="payment-logo">
            <img src="assets/mercadopago.svg" alt="Mercado Pago">
        </div>

    </div>

    <div class="payment-bar">

        <div class="payment-text">
            Pago seguro con
        </div>

        <div class="payment-logo">
            <img src="assets/paypal.svg" alt="PayPal">
        </div>

    </div>

</div>

<script>

function sendHeight() {
    const height = document.documentElement.scrollHeight;
    parent.postMessage({ frameHeight: height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

new ResizeObserver(sendHeight).observe(document.body);

</script>

</body>
</html>
