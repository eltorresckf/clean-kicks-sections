<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:transparent;
    padding:18px;
}

.container{
    width:100%;
    max-width:720px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.card{

    background:#f7f7f7;
    border:1px solid #ececec;
    border-radius:18px;

    padding:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:88px;

    transition:.25s ease;

}

.card:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 24px rgba(0,0,0,.08);

}

.card img{

    max-width:220px;
    width:100%;
    height:auto;
    display:block;

}

@media(max-width:768px){

    body{

        padding:12px;

    }

    .card{

        min-height:74px;

        padding:18px;

        border-radius:16px;

    }

    .card img{

        max-width:170px;

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <img src="assets/Mercado_Pago.svg.webp" alt="Mercado Pago">

    </div>

    <div class="card">

        <img src="paypal.svg" alt="PayPal">

    </div>

</div>

<script>

function sendHeight(){
    const h=document.documentElement.scrollHeight;
    parent.postMessage({frameHeight:h},"*");
}

window.addEventListener("load",sendHeight);

new ResizeObserver(sendHeight).observe(document.body);

</script>

</body>
</html>
