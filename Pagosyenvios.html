<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.section{
    width:100%;
    padding:35px 20px;
}

/* =========================
   MÉTODOS DE PAGO
========================= */

.payment-logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
    margin-bottom:35px;
}

.payment-card{
    width:120px;
    height:58px;
    background:#ffffff;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:8px;
    border:1px solid rgba(0,0,0,.05);
}

.payment-card img{
    max-width:90%;
    max-height:28px;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
}

/* =========================
   BENEFICIOS
========================= */

.benefits{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    width:100%;
    align-items:center;
    margin-top:10px;
}

.benefit{
    display:flex;
    align-items:center;
    gap:10px;
}

.benefit:nth-child(1){
    justify-self:start;
}

.benefit:nth-child(2){
    justify-self:center;
}

.benefit:nth-child(3){
    justify-self:end;
}

.icon{
    width:20px;
    height:20px;
    stroke:#fff;
    stroke-width:1.8;
    fill:none;
    flex-shrink:0;
}

.benefit span{
    font-size:14px;
    color:#fff;
    white-space:nowrap;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .section{
        padding:30px 12px;
    }

    .payment-logos{
        justify-content:space-between;
        gap:4px;
    }

    .payment-card{
        width:calc((100vw - 48px) / 6);
        height:42px;
        padding:4px;
        border-radius:8px;
    }

    .payment-card img{
        max-width:90%;
        max-height:16px;
    }

    .benefits{
        grid-template-columns:1fr;
        gap:16px;
        margin-top:10px;
    }

    .benefit{
        justify-self:start !important;
    }

    .benefit span{
        font-size:13px;
    }

}

</style>
</head>
<body>

<section class="section">

    <div class="payment-logos">

        <div class="payment-card">
            <img src="assets/visa.png" alt="Visa">
        </div>

        <div class="payment-card">
            <img src="assets/mastercard.svg" alt="Mastercard">
        </div>

        <div class="payment-card">
            <img src="assets/americanexpress.png" alt="American Express">
        </div>

        <div class="payment-card">
            <img src="assets/mercadopago.png" alt="Mercado Pago">
        </div>

        <div class="payment-card">
            <img src="assets/oxxo.png" alt="OXXO Pay">
        </div>

        <div class="payment-card">
            <img src="assets/paypal.png" alt="PayPal">
        </div>

    </div>

    <div class="benefits">

        <div class="benefit">

            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 12h12"></path>
                <path d="M8 7l-5 5 5 5"></path>
                <path d="M21 12a9 9 0 0 0-9-9"></path>
            </svg>

            <span>Limpieza efectiva</span>

        </div>

        <div class="benefit">

            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 7l9-4 9 4"></path>
                <path d="M3 7v10l9 4 9-4V7"></path>
                <path d="M12 3v18"></path>
            </svg>

            <span>Envío gratis desde $699</span>

        </div>

        <div class="benefit">

            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 7h11v8H3z"></path>
                <path d="M14 10h4l3 3v2h-7"></path>
                <circle cx="7" cy="18" r="2"></circle>
                <circle cx="18" cy="18" r="2"></circle>
            </svg>

            <span>Entrega de 2 a 5 días hábiles</span>

        </div>

    </div>

</section>

<script>
function sendHeight() {
    const height = document.documentElement.scrollHeight;
    parent.postMessage(
        { iframeHeight: height },
        "*"
    );
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
</script>

</body>
</html>
