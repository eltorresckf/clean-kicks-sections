<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
  color: #fff;
}

.ckf-wrapper {
  width: 100%;
  padding: 0 16px;
  box-sizing: border-box;
}

.ckf-container {
  width: 100%;
}

@media (min-width: 1024px) {
  .ckf-container {
    max-width: 1100px;
    margin: 0 auto;
  }
}

.section-box {
  background: #0d0d0d;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* 🔥 SLIDER PRO */
.slider {
  position: relative;
  width: 100%;
  height: 520px;
  overflow: hidden;
  border-radius: 14px;
}

/* 🔥 IMÁGENES BIEN CENTRADAS */
.slider img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center; /* 👈 CLAVE */
}

/* AFTER */
.after {
  position: absolute;
  inset: 0;
  overflow: hidden;
  clip-path: inset(0 50% 0 0);
}

/* DIVIDER */
.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: #fff;
  cursor: ew-resize;
}

/* HANDLE */
.handle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 8px 12px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: bold;
}

/* LABELS */
.label {
  position: absolute;
  top: 12px;
  padding: 6px 10px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
}

.before-label { left: 12px; }
.after-label { right: 12px; }

.copy {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.85;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  .slider {
    height: 360px;
  }

  /* 🔥 AJUSTE EXTRA MOBILE */
  .slider img {
    object-position: center top;
  }

  .section-box {
    padding: 16px;
  }
}
</style>
</head>

<body>

<div class="ckf-wrapper">
  <div class="ckf-container">

    <div class="section-box">

      <div class="slider" id="slider">

        <img src="https://i.imgur.com/k1RWxUB.jpeg">

        <div class="after" id="after">
          <img src="https://i.imgur.com/5QbcVo2.jpeg">
        </div>

        <div class="divider" id="divider">
          <div class="handle">↔</div>
        </div>

        <div class="label before-label">ANTES</div>
        <div class="label after-label">DESPUÉS</div>

      </div>

      <div class="copy">
        De esto… a esto en minutos. Resultados reales.
      </div>

    </div>

  </div>
</div>

<script>
const slider = document.getElementById('slider');
const after = document.getElementById('after');
const divider = document.getElementById('divider');

let isDragging = false;

divider.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  moveSlider(e.clientX);
});

slider.addEventListener('touchstart', () => isDragging = true);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  moveSlider(e.touches[0].clientX);
});

function moveSlider(clientX) {
  const rect = slider.getBoundingClientRect();
  let x = clientX - rect.left;

  if (x < 0) x = 0;
  if (x > rect.width) x = rect.width;

  const percent = (x / rect.width) * 100;

  after.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
  divider.style.left = percent + "%";
}
</script>

</body>
</html>
