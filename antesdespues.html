<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
  color: #fff;
}

/* 🔥 BASE CKF */
.ckf-wrapper {
  width: 100%;
  padding: 0 16px;
  box-sizing: border-box;
}

.ckf-container {
  width: 100%;
}

/* DESKTOP */
@media (min-width: 1024px) {
  .ckf-container {
    max-width: 1100px;
    margin: 0 auto;
  }
}

/* ===== DISEÑO ===== */

.section-box {
  background: #0d0d0d;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* 🔥 SLIDER (FIX REAL) */
.slider {
  position: relative;
  width: 100%;
  height: 500px; /* 👈 CLAVE */
  overflow: hidden;
  border-radius: 14px;
}

.slider img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* AFTER */
.after {
  position: absolute;
  inset: 0;
  overflow: hidden;
  clip-path: inset(0 50% 0 0);
}

/* DIVIDER */
.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: rgba(255,255,255,0.95);
  cursor: ew-resize;
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
}

/* HANDLE */
.handle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 6px 18px rgba(0,0,0,0.6);
}

/* LABELS */
.label {
  position: absolute;
  top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
}

.before-label {
  left: 12px;
}

.after-label {
  right: 12px;
}

/* COPY */
.copy {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.85;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  .slider {
    height: 320px; /* 👈 CLAVE MOBILE */
  }

  .section-box {
    padding: 16px;
  }
}
</style>
</head>

<body>

<div class="ckf-wrapper">
  <div class="ckf-container">

    <div class="section-box">

      <div class="slider" id="slider">

        <!-- ANTES -->
        <img src="https://i.imgur.com/k1RWxUB.jpeg" alt="Antes">

        <!-- DESPUÉS -->
        <div class="after" id="after">
          <img src="https://i.imgur.com/5QbcVo2.jpeg" alt="Después">
        </div>

        <!-- DIVISOR -->
        <div class="divider" id="divider">
          <div class="handle">↔</div>
        </div>

        <!-- LABELS -->
        <div class="label before-label">ANTES</div>
        <div class="label after-label">DESPUÉS</div>

      </div>

      <div class="copy">
        De esto… a esto en minutos. Resultados reales.
      </div>

    </div>

  </div>
</div>

<script>
const slider = document.getElementById('slider');
const after = document.getElementById('after');
const divider = document.getElementById('divider');

let isDragging = false;

/* MOUSE */
divider.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  moveSlider(e.clientX);
});

/* TOUCH */
slider.addEventListener('touchstart', () => isDragging = true);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  moveSlider(e.touches[0].clientX);
});

function moveSlider(clientX) {
  const rect = slider.getBoundingClientRect();
  let x = clientX - rect.left;

  if (x < 0) x = 0;
  if (x > rect.width) x = rect.width;

  const percent = (x / rect.width) * 100;

  after.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
  divider.style.left = percent + "%";
}

/* AUTO ANIMACIÓN */
let autoMove = true;
let direction = 1;
let current = 50;

function animate() {
  if (!autoMove) return;

  current += direction * 0.2;

  if (current >= 80) direction = -1;
  if (current <= 20) direction = 1;

  after.style.clipPath = `inset(0 ${100 - current}% 0 0)`;
  divider.style.left = current + "%";

  requestAnimationFrame(animate);
}

animate();

/* DETENER AUTO */
divider.addEventListener('mousedown', () => autoMove = false);
slider.addEventListener('touchstart', () => autoMove = false);
</script>

</body>
</html>
