<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes y Después</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: Arial, sans-serif;
  color: #fff;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

/* --- SLIDER PRO --- */
.slider {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1; /* 👈 CLAVE PARA CENTRADO PERFECTO */
  overflow: hidden;
  border-radius: 14px;
}

.slider img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover; /* 👈 IMAGENES BIEN AJUSTADAS */
}

/* --- AFTER --- */
.after {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

/* --- DIVISOR --- */
.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: rgba(255,255,255,0.95);
  cursor: ew-resize;
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
}

/* --- BOTÓN CENTRAL --- */
.handle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 6px 18px rgba(0,0,0,0.6);
}

/* --- LABELS --- */
.label {
  position: absolute;
  top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
  letter-spacing: 1px;
}

.before-label {
  left: 12px;
}

.after-label {
  right: 12px;
}

/* --- COPY --- */
.copy {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">

  <div class="slider" id="slider">
    <img src="https://imgur.com/5QbcVo2" alt="Antes">
    
    <div class="after" id="after">
      <img src="https://imgur.com/k1RWxUB" alt="Después">
    </div>

    <div class="divider" id="divider">
      <div class="handle">↔</div>
    </div>

    <div class="label before-label">ANTES</div>
    <div class="label after-label">DESPUÉS</div>
  </div>

  <div class="copy">
    De esto… a esto en minutos. Resultados reales.
  </div>

</div>

<script>
const slider = document.getElementById('slider');
const after = document.getElementById('after');
const divider = document.getElementById('divider');

let isDragging = false;

// --- MOUSE ---
divider.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  moveSlider(e.clientX);
});

// --- TOUCH ---
slider.addEventListener('touchstart', () => isDragging = true);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  moveSlider(e.touches[0].clientX);
});

// --- FUNCIÓN ---
function moveSlider(clientX) {
  const rect = slider.getBoundingClientRect();
  let x = clientX - rect.left;

  if (x < 0) x = 0;
  if (x > rect.width) x = rect.width;

  const percent = (x / rect.width) * 100;

  after.style.width = percent + "%";
  divider.style.left = percent + "%";
}

// --- AUTO ANIMACIÓN ---
let autoMove = true;
let direction = 1;

function animate() {
  if (!autoMove) return;

  let current = parseFloat(after.style.width) || 50;
  current += direction * 0.3;

  if (current >= 80) direction = -1;
  if (current <= 20) direction = 1;

  after.style.width = current + "%";
  divider.style.left = current + "%";

  requestAnimationFrame(animate);
}

animate();

// detener animación si interactúan
divider.addEventListener('mousedown', () => autoMove = false);
slider.addEventListener('touchstart', () => autoMove = false);

</script>

</body>
</html>
