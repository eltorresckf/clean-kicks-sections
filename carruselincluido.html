<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:'Inter',sans-serif;
color:white;
}

.section{
max-width:1350px;
margin:auto;
padding:80px 0;
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
margin-bottom:45px;
}

h2{
font-size:56px;
font-weight:700;
line-height:1;
}

.gold{
color:#CD9341;
}

.buttons{
display:flex;
gap:16px;
}

.btn{
width:64px;
height:64px;
border-radius:50%;
border:2px solid white;
background:transparent;
color:white;
font-size:28px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#CD9341;
border-color:#CD9341;
color:black;
}

.viewport{
overflow:hidden;
padding-left:40px;
}

.track{
display:flex;
gap:28px;
transition:.45s ease;
touch-action:pan-y;
cursor:grab;
}

.card{
flex:0 0 420px;
}

.image{

height:420px;
background:#161616;
border-radius:28px;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;
}

.image img{
width:82%;
height:auto;
object-fit:contain;
}

.card h3{
font-size:36px;
margin-top:26px;
margin-bottom:12px;
}

.card p{
font-size:22px;
line-height:1.5;
color:#bdbdbd;
}

@media(max-width:900px){

.section{
padding:50px 0;
}

.header{
padding:0 20px;
margin-bottom:30px;
}

h2{
font-size:36px;
}

.viewport{
padding-left:20px;
}

.card{
flex:0 0 84%;
}

.image{
height:300px;
}

.card h3{
font-size:28px;
}

.card p{
font-size:18px;
}

.btn{
width:50px;
height:50px;
font-size:22px;
}

}

</style>
</head>

<body>

<section class="section">

<div class="header">

<h2>
¿Qué incluye <span class="gold">el kit?</span>
</h2>

<div class="buttons">
<button class="btn" id="prev">←</button>
<button class="btn" id="next">→</button>
</div>

</div>

<div class="viewport">

<div class="track" id="track">

<div class="card">

<div class="image">
<img src="assets/limpiador.png">
</div>

<h3>Limpiador Premium</h3>

<p>
Limpia profundamente sin dañar los materiales.
</p>

</div>

<div class="card">

<div class="image">
<img src="assets/cepillo.png">
</div>

<h3>Cepillo Premium</h3>

<p>
Cerdas de dureza media ideales para la mayoría de materiales.
</p>

</div>

<div class="card">

<div class="image">
<img src="assets/toalla.png">
</div>

<h3>Toalla de Microfibra</h3>

<p>
Elimina la suciedad y deja un acabado impecable.
</p>

</div>

</div>

</div>

</section>

<script>

const track=document.getElementById("track");

const cards=document.querySelectorAll(".card");

let index=0;

function update(){

const width=cards[0].offsetWidth+28;

track.style.transform=`translateX(-${index*width}px)`;

}

document.getElementById("next").onclick=()=>{

if(index<cards.length-1){

index++;

update();

}

}

document.getElementById("prev").onclick=()=>{

if(index>0){

index--;

update();

}

}

// Swipe

let startX=0;

let current=0;

track.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX;

});

track.addEventListener("touchend",e=>{

current=e.changedTouches[0].clientX;

let diff=startX-current;

if(diff>50 && index<cards.length-1){

index++;

}

if(diff<-50 && index>0){

index--;

}

update();

});

window.addEventListener("resize",update);

</script>

</body>
</html>
