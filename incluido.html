<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incluye tu kit</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: #000000;
    color: #ffffff;
  }

  .container {
    width: 100%;
    max-width: 100%;
    padding: 24px 16px;
    margin: 0 auto;
  }

  h2 {
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .item {
    background: #111111;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.4;
  }

  .highlight {
    color: #cd9341;
    font-weight: 600;
  }

  .desc {
    margin-top: 20px;
    font-size: 14px;
    text-align: center;
    color: #bfbfbf;
  }

  @media (min-width: 768px) {
    h2 {
      font-size: 26px;
    }

    .item {
      font-size: 16px;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h2>¿Qué incluye tu kit?</h2>

  <div class="list">

    <div class="item">
      <span class="highlight">Limpiador premium 250ml</span><br>
      Elimina suciedad sin dañar tus sneakers
    </div>

    <div class="item">
      <span class="highlight">Cepillo multipropósito</span><br>
      Ideal para todo tipo de materiales
    </div>

    <div class="item">
      <span class="highlight">Toalla de microfibra</span><br>
      Absorbe y deja acabado limpio
    </div>

  </div>

  <div class="desc">
    Todo lo que necesitas para limpiar tus sneakers de forma segura y efectiva.
  </div>

</div>

</body>
</html>
