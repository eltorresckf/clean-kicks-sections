<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sección Confianza</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 12px;
    }

    .card {
      background: #181818;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      font-size: 14px;
      color: #f5f5f5;
    }

    .item:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .icon {
      margin-right: 12px;
      font-size: 16px;
      opacity: 0.9;
    }

    .text {
      letter-spacing: 0.2px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="item">
      <span class="icon">🧼</span>
      <span class="text">Resultados visibles desde la primera limpieza</span>
    </div>

    <div class="item">
      <span class="icon">👟</span>
      <span class="text">Ideal para todo tipo de sneakers</span>
    </div>

    <div class="item">
      <span class="icon">🚚</span>
      <span class="text">Envíos a todo México</span>
    </div>

    <div class="item">
      <span class="icon">🔒</span>
      <span class="text">Compra 100% segura</span>
    </div>

  </div>
</div>

<!-- 🔥 SCRIPT AUTO ALTURA -->
<script>
  function sendHeight() {
    const height = document.body.scrollHeight;
    window.parent.postMessage({ height: height }, "*");
  }

  window.onload = sendHeight;
  window.onresize = sendHeight;
</script>

</body>
</html>
