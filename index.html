<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sección Confianza</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 10px;
    }

    .card {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 15px;
    }

    .item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #222;
    }

    .item:last-child {
      margin-bottom: 0;
    }

    .icon {
      margin-right: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="item">
      <span class="icon">🧼</span>
      Resultados visibles desde la primera limpieza
    </div>

    <div class="item">
      <span class="icon">👟</span>
      Ideal para sneakers de todo tipo
    </div>

    <div class="item">
      <span class="icon">🚚</span>
      Envíos a todo México
    </div>

    <div class="item">
      <span class="icon">🔒</span>
      Compra 100% segura
    </div>

  </div>
</div>

</body>
</html>
