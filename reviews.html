<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.section {
  max-width: 1100px;
  margin: auto;
  padding: 30px 15px;
  overflow: hidden;
}

.title {
  color: #fff;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.slider {
  overflow: hidden;
}

.track {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scroll 35s linear infinite;
}

.card {
  flex: 0 0 calc(50vw - 18px);
  max-width: 260px;
  background: #111;
  border-radius: 18px;
  overflow: hidden;
}

.image {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 14px;
  text-align: center;
}

.stars {
  color: #00c2ff;
  font-size: 14px;
}

.name {
  color: #fff;
  font-weight: 600;
  font-size: 14px;
}

.text {
  color: #ccc;
  font-size: 13px;
}

/* PAUSA AL INTERACTUAR */
.track:active {
  animation-play-state: paused;
}

.slider:hover .track {
  animation-play-state: paused;
}

/* ANIMACIÓN */
@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-30%);
  }
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Resultados reales 🔥</div>

  <div class="slider">
    <div class="track">

      <!-- 6 CARDS -->
      <div class="card">...</div>
      <div class="card">...</div>
      <div class="card">...</div>
      <div class="card">...</div>
      <div class="card">...</div>
      <div class="card">...</div>

    </div>
  </div>
</div>

</body>
</html>
