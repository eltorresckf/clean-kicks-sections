<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.section {
  max-width: 1100px;
  margin: auto;
  padding: 30px 15px;
  overflow: hidden;
}

.title {
  color: #fff;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.slider {
  overflow: hidden;
  width: 100%;
}

/* 👇 AQUÍ ESTÁ EL FIX */
.track {
  display: flex;
  gap: 12px;
  animation: scroll 30s linear infinite;
}

/* 👇 CLAVE: ancho fijo para evitar colapso */
.card {
  flex: 0 0 48%;
  min-width: 48%;
  max-width: 48%;
  background: #111;
  border-radius: 18px;
  overflow: hidden;
}

.image {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 14px;
  text-align: center;
}

.stars {
  color: #00c2ff;
  font-size: 14px;
  margin-bottom: 6px;
}

.name {
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}

.text {
  color: #ccc;
  font-size: 13px;
}

/* Desktop */
@media (min-width: 768px) {
  .card {
    flex: 0 0 260px;
    min-width: 260px;
    max-width: 260px;
  }
}

/* Animación más corta para evitar “línea” */
@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-200px);
  }
}

/* pausa al interactuar */
.slider:active .track,
.slider:hover .track {
  animation-play-state: paused;
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Resultados reales 🔥</div>

  <div class="slider">
    <div class="track">

      <!-- 6 CARDS -->
      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Rosa G.</div>
          <div class="text">Quedaron como nuevos</div>
        </div>
      </div>

      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Carlos A.</div>
          <div class="text">Mucho mejor que la lavadora</div>
        </div>
      </div>

      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Luis M.</div>
          <div class="text">Sí blanquea</div>
        </div>
      </div>

      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Diego R.</div>
          <div class="text">En 10 minutos listos</div>
        </div>
      </div>

      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Javier M.</div>
          <div class="text">Sí funciona</div>
        </div>
      </div>

      <div class="card">
        <img class="image" src="https://via.placeholder.com/300x200">
        <div class="content">
          <div class="stars">★★★★★</div>
          <div class="name">Alex P.</div>
          <div class="text">No daña los tenis</div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
