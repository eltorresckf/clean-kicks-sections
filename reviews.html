<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.title {
  color: #fff;
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 30px;
}

.slider {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 10px;
}

.slider::-webkit-scrollbar {
  display: none;
}

.card {
  min-width: 280px;
  max-width: 280px;
  background: #111;
  border-radius: 20px;
  overflow: hidden;
  scroll-snap-align: start;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.image {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 20px;
  text-align: center;
}

.stars {
  color: #00c2ff;
  font-size: 18px;
  margin-bottom: 10px;
}

.name {
  color: #fff;
  font-weight: 600;
  margin-bottom: 10px;
}

.text {
  color: #ccc;
  font-size: 14px;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Clientes felices 💧</div>

  <div class="slider">

    <!-- Review 1 -->
    <div class="card">
      <img class="image" src="https://via.placeholder.com/300x200" />
      <div class="content">
        <div class="stars">★★★★★</div>
        <div class="name">Rosa G. ✔</div>
        <div class="text">Se ven divinas y son muy puntuales con las entregas</div>
      </div>
    </div>

    <!-- Review 2 -->
    <div class="card">
      <img class="image" src="https://via.placeholder.com/300x200" />
      <div class="content">
        <div class="stars">★★★★★</div>
        <div class="name">Carlos A. ✔</div>
        <div class="text">Entregas puntuales, buen seguimiento y excelente atención</div>
      </div>
    </div>

    <!-- Review 3 -->
    <div class="card">
      <img class="image" src="https://via.placeholder.com/300x200" />
      <div class="content">
        <div class="stars">★★★★★</div>
        <div class="name">Luis M. ✔</div>
        <div class="text">Mis tenis quedaron como nuevos, sí funciona 🔥</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
