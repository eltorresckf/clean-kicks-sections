<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.section {
  max-width: 1100px;
  margin: auto;
  padding: 30px 15px;
}

.title {
  color: #fff;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.slider {
  display: flex;
  gap: 12px;
  overflow-x: auto; /* 👈 vuelve el swipe */
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.slider::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 calc(50% - 6px);
  background: #111;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.image {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 14px;
  text-align: center;
}

.stars {
  color: #00c2ff;
  font-size: 14px;
  margin-bottom: 6px;
}

.name {
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}

.text {
  color: #ccc;
  font-size: 13px;
  line-height: 1.3;
}

@media (min-width: 768px) {
  .card {
    flex: 0 0 260px;
  }
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Resultados reales 🔥</div>

  <div class="slider" id="slider">

    <!-- 6 REVIEWS -->
    <div class="card">...</div>
    <div class="card">...</div>
    <div class="card">...</div>
    <div class="card">...</div>
    <div class="card">...</div>
    <div class="card">...</div>

  </div>
</div>

<script>
const slider = document.getElementById('slider');

// duplicar para loop infinito
slider.innerHTML += slider.innerHTML;

let speed = 0.3;
let isUserInteracting = false;

// autoplay
function autoScroll() {
  if (!isUserInteracting) {
    slider.scrollLeft += speed;

    if (slider.scrollLeft >= slider.scrollWidth / 2) {
      slider.scrollLeft = 0;
    }
  }
  requestAnimationFrame(autoScroll);
}

autoScroll();

// detectar interacción del usuario
slider.addEventListener('touchstart', () => isUserInteracting = true);
slider.addEventListener('mousedown', () => isUserInteracting = true);

slider.addEventListener('touchend', () => {
  setTimeout(() => isUserInteracting = false, 1500);
});

slider.addEventListener('mouseup', () => {
  setTimeout(() => isUserInteracting = false, 1500);
});
</script>

</body>
</html>
