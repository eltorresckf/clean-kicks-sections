<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.section {
  max-width: 1100px;
  margin: auto;
  padding: 30px 15px;
}

.title {
  color: #fff;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.slider {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.slider::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 calc(50% - 6px);
  min-width: calc(50% - 6px); /* 👈 CLAVE */
  background: #111;
  border-radius: 18px;
  overflow: hidden;
}

.image {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 14px;
  text-align: center;
}

.stars {
  color: #00c2ff;
  font-size: 14px;
  margin-bottom: 6px;
}

.name {
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}

.text {
  color: #ccc;
  font-size: 13px;
}

@media (min-width: 768px) {
  .card {
    flex: 0 0 260px;
    min-width: 260px;
  }
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Resultados reales 🔥</div>

  <div class="slider" id="slider">

    <!-- 6 CARDS -->
    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Rosa G.</div><div class="text">Quedaron como nuevos</div></div></div>

    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Carlos A.</div><div class="text">Mejor que la lavadora</div></div></div>

    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Luis M.</div><div class="text">Sí blanquea</div></div></div>

    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Diego R.</div><div class="text">10 minutos y listos</div></div></div>

    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Javier M.</div><div class="text">Sí funciona</div></div></div>

    <div class="card"><img class="image" src="https://via.placeholder.com/300x200"><div class="content"><div class="stars">★★★★★</div><div class="name">Alex P.</div><div class="text">No los daña</div></div></div>

  </div>
</div>

<script>
const slider = document.getElementById('slider');

// CLONAR SOLO UNA VEZ
const cards = slider.innerHTML;
slider.innerHTML += cards;

let speed = 0.3;
let isInteracting = false;

function autoScroll() {
  if (!isInteracting) {
    slider.scrollLeft += speed;

    if (slider.scrollLeft >= slider.scrollWidth / 2) {
      slider.scrollLeft = 0;
    }
  }
  requestAnimationFrame(autoScroll);
}

autoScroll();

// interacción usuario
slider.addEventListener('touchstart', () => isInteracting = true);
slider.addEventListener('mousedown', () => isInteracting = true);

slider.addEventListener('touchend', () => {
  setTimeout(() => isInteracting = false, 1200);
});

slider.addEventListener('mouseup', () => {
  setTimeout(() => isInteracting = false, 1200);
});
</script>

</body>
</html>
