<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Carousel CKF</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.section {
  padding: 20px 15px;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 15px;
}

.carousel {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.video-card {
  min-width: 160px;
  height: 280px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  scroll-snap-align: start;
  background: #111;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.label {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  padding: 6px 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="section">
  <div class="title">Mira cómo funciona 👇</div>
  <div class="subtitle">Resultados reales en segundos</div>

  <div class="carousel">

    <div class="video-card">
      <video autoplay muted loop playsinline>
        <source src="VIDEO1.mp4" type="video/mp4">
      </video>
      <div class="label">Aplica la espuma</div>
    </div>

    <div class="video-card">
      <video autoplay muted loop playsinline>
        <source src="VIDEO2.mp4" type="video/mp4">
      </video>
      <div class="label">Cepilla suavemente</div>
    </div>

    <div class="video-card">
      <video autoplay muted loop playsinline>
        <source src="VIDEO3.mp4" type="video/mp4">
      </video>
      <div class="label">Retira la suciedad</div>
    </div>

    <div class="video-card">
      <video autoplay muted loop playsinline>
        <source src="VIDEO4.mp4" type="video/mp4">
      </video>
      <div class="label">Resultado final 🔥</div>
    </div>

  </div>
</div>

</body>
</html>
